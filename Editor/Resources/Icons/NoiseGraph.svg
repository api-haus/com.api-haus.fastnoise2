<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Noise Graph Icon: single filled node with ports and noise waveform inside -->

  <!-- Node body (filled) -->
  <rect x="14" y="10" width="36" height="44" rx="4" ry="4" fill="#2C2C3A" stroke="#E8E8E8" stroke-width="3.5"/>

  <!-- Input ports (left side) -->
  <circle cx="14" cy="24" r="4" fill="#4A90D9" stroke="#E8E8E8" stroke-width="2"/>
  <circle cx="14" cy="40" r="4" fill="#4A90D9" stroke="#E8E8E8" stroke-width="2"/>

  <!-- Output port (right side) -->
  <circle cx="50" cy="32" r="4" fill="#FFD54F" stroke="#E8E8E8" stroke-width="2"/>

  <!-- Noise waveform inside the node -->
  <path d="M22 32 C25 20, 28 44, 32 26 S38 42, 42 32"
        fill="none" stroke="#FFD54F" stroke-width="3.5" stroke-linecap="round"/>
</svg>
