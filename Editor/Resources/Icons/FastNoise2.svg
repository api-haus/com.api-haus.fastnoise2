<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- FastNoise2 Logo: bold central noise wave with prominent "2" -->

  <!-- Solid background circle -->
  <circle cx="32" cy="32" r="30" fill="#1E1E2E"/>

  <!-- Thick central noise waveform - the main pictogram -->
  <path d="M10 32 C14 18, 20 46, 26 24 S34 44, 38 28 S48 42, 54 32"
        fill="none" stroke="#E8E8E8" stroke-width="5" stroke-linecap="round"/>

  <!-- Second wave layer underneath for depth -->
  <path d="M10 32 C16 42, 22 20, 28 38 S36 18, 42 36 S50 22, 54 32"
        fill="none" stroke="#4A90D9" stroke-width="4" stroke-linecap="round" opacity="0.45"/>

  <!-- Bold "2" bottom-right, integrated into the circle -->
  <path d="M38 46 Q38 41, 43 41 Q48 41, 48 46 Q48 49, 43 53 L38 57 L49 57"
        fill="none" stroke="#FFD54F" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
